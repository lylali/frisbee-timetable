spring:
  application:
    name: frisbee-timetable

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/frisbee}
    username: ${SPRING_DATASOURCE_USERNAME:frisbee}
    password: ${SPRING_DATASOURCE_PASSWORD:frisbee}

  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: ${PORT:8080}
